<body>
    <header class="product-page-header">
        <div class="container product-page-header-inner">
            <a class="product-back-link" href="/">
                <i class="fas fa-arrow-right"></i>
                العودة للمتجر
            </a>

            <div class="product-page-actions">
                <div class="theme-switch-wrapper">
                    <div class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع">
                        <div class="theme-toggle-ball">
                            <i class="fas fa-sun"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="product-page">
        <div class="container">
            <div id="productPageError" class="product-page-error" style="display:none;"></div>

            <div class="product-page-grid" id="productPageGrid" style="display:none;">
                <!-- Product info -->
                <section class="product-page-card">
                    <div class="product-page-media">
                        <img id="productImage" src="" alt="">
                        <div class="product-page-badge" id="productBadge" style="display:none;"></div>
                    </div>

                    <div class="product-page-info">
                        <h1 class="product-page-title" id="productName"></h1>
                        <p class="product-page-desc" id="productDescription"></p>

                        <div class="product-page-prices">
                            <div class="product-page-price" id="productPrice"></div>
                            <div class="product-page-old-price" id="productOldPrice" style="display:none;"></div>
                        </div>

                        <div class="weight-selector-container" id="weightSelectorContainer" style="display:none; margin: 20px 0;">
                            <h4 style="margin-bottom: 10px; color: var(--text-secondary); font-size: 14px;">اختر الوزن:</h4>
                            <div class="weight-buttons" id="weightButtons" style="display: flex; flex-wrap: wrap; gap: 10px;">
                                <!-- Buttons will be injected here -->
                            </div>
                            <div class="custom-weight-input" id="customWeightInputGroup" style="display: none; margin-top: 10px;">
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <input type="number" id="customWeightInput" min="50" placeholder="أدخل الوزن بالغرام" style="flex: 1; padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); font-family: 'Cairo', sans-serif;">
                                    <span style="font-weight: bold; color: var(--text-primary);">غرام</span>
                                </div>
                            </div>
                        </div>

                        <div class="quantity-selector product-page-qty" id="quantitySelector">
                            <button type="button" onclick="changeQuantity(-1)">-</button>
                            <input type="number" id="quantity" value="1" min="1">
                            <button type="button" onclick="changeQuantity(1)">+</button>
                        </div>
                    </div>
                </section>

                <!-- Checkout form -->
                <section class="product-page-card">
                    <div class="order-summary">
                        <h4><i class="fas fa-shopping-bag"></i> ملخص الطلب</h4>
                        <div id="singleCheckoutItem"></div>
                        <div class="order-summary-line" id="deliveryFeeLine" style="display:none;">
                            <span><i class="fas fa-truck"></i> رسوم التوصيل:</span>
                            <span id="deliveryFeeAmount">0 د.ج</span>
                        </div>
                        <div class="checkout-total">
                            <strong>المجموع الكلي: <span id="total">0 د.ج</span></strong>
                        </div>
                    </div>

                    <form id="singleCheckoutForm">
                        <h4><i class="fas fa-user"></i> معلوماتك الشخصية</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">الاسم *</label>
                                <input type="text" id="firstName" name="firstName" required placeholder="محمد">
                            </div>
                            <div class="form-group">
                                <label for="lastName">اللقب *</label>
                                <input type="text" id="lastName" name="lastName" required placeholder="أحمد">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="phone">رقم الهاتف *</label>
                            <input type="tel" id="phone" name="phone" required placeholder="07XX XX XX XX">
                        </div>
                        <div class="form-group">
                            <label for="wilaya">الولاية *</label>
                            <select id="wilaya" name="wilaya" required>
                                <option value="">اختر الولاية</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="baladiya">البلدية *</label>
                            <select id="baladiya" name="baladiya" required disabled>
                                <option value="">اختر الولاية أولاً</option>
                            </select>
                        </div>
                        <div class="form-group" id="customBaladiyaGroup" style="display: none;">
                            <label for="customBaladiya">اكتب اسم البلدية:</label>
                            <input type="text" id="customBaladiya" name="customBaladiya" placeholder="اكتب اسم البلدية">
                        </div>

                        <div class="form-group">
                            <label>خيارات التوصيل *</label>
                            <div class="delivery-options">
                                <label class="delivery-option">
                                    <input type="radio" name="deliveryOption" value="stopdesk" checked>
                                    <div class="delivery-option-content">
                                        <div class="delivery-option-title">
                                            <i class="fas fa-home"></i>
                                            <span>التوصيل إلى المنزل</span>
                                        </div>
                                        <div class="delivery-option-price" id="stopdeskPrice">--</div>
                                    </div>
                                </label>
                                <label class="delivery-option">
                                    <input type="radio" name="deliveryOption" value="stopdoor">
                                    <div class="delivery-option-content">
                                        <div class="delivery-option-title">
                                            <i class="fas fa-building"></i>
                                            <span>الاستلام من المكتب</span>
                                        </div>
                                        <div class="delivery-option-price" id="stopdoorPrice">--</div>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="payment-info">
                            <i class="fas fa-info-circle"></i>
                            <span>الدفع عند الاستلام - ستدفع عند وصول طلبك</span>
                        </div>

                        <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">
                            <i class="fas fa-paper-plane"></i>
                            تأكيد الطلب
                        </button>
                    </form>

                    <div class="product-page-success" id="successBox" style="display:none;"></div>
                </section>
            </div>
        </div>
    </main>

    <!-- Floating Buy Button -->
    <div class="floating-buy-btn" id="floatingBuyBtn">
        <button onclick="scrollToCheckout()">
            <i class="fas fa-shopping-cart"></i>
            <span>اطلب الآن</span>
            <div class="pulse-ring"></div>
        </button>
    </div>

    <style>
        .floating-buy-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .floating-buy-btn button {
            background: linear-gradient(135deg, #8b5a2b 0%, #c9a227 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(139, 90, 43, 0.4);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: visible;
            transition: all 0.3s ease;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        .floating-buy-btn button:hover {
            transform: translateY(-5px) !important;
            box-shadow: 0 12px 40px rgba(139, 90, 43, 0.6);
        }

        .floating-buy-btn button:active {
            transform: translateY(-2px) !important;
        }

        .floating-buy-btn .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border: 3px solid #c9a227;
            border-radius: 50px;
            animation: pulse 2s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 0;
            }
        }

        .floating-buy-btn button i {
            font-size: 20px;
            animation: shake 1.5s infinite;
        }

        @keyframes shake {
            0%, 100% {
                transform: rotate(0deg);
            }
            10%, 30%, 50%, 70%, 90% {
                transform: rotate(-10deg);
            }
            20%, 40%, 60%, 80% {
                transform: rotate(10deg);
            }
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .floating-buy-btn button {
                padding: 14px 30px;
                font-size: 16px;
            }
        }

        .weight-btn {
            border: 2px solid var(--border-color) !important;
            background-color: var(--bg-secondary) !important;
            color: var(--text-secondary) !important;
            padding: 8px 20px !important;
            border-radius: 25px !important;
            font-family: inherit !important;
            font-weight: 700 !important;
            font-size: 15px !important;
            cursor: pointer !important;
            transition: all 0.3s ease !important;
            margin: 4px !important;
            outline: none;
        }
        
        .weight-btn:hover {
            border-color: var(--accent-color) !important;
            color: var(--accent-color) !important;
        }

        .weight-btn.active-weight {
            background-color: var(--accent-color) !important;
            color: #fff !important;
            border-color: var(--accent-color) !important;
        }
    </style>

    <script>
        // Floating button scroll behavior
        (function() {
            const floatingBtn = document.getElementById('floatingBuyBtn');
            const submitBtn = document.getElementById('submitBtn');

            function updateFloatingButton() {
                if (!submitBtn || !floatingBtn) return;

                const submitBtnRect = submitBtn.getBoundingClientRect();
                // Check if submit button is visible in viewport
                const isSubmitBtnVisible = submitBtnRect.top < window.innerHeight && submitBtnRect.bottom > 0;

                // Hide floating button only when real button is visible
                if (isSubmitBtnVisible) {
                    floatingBtn.style.display = 'none';
                } else {
                    floatingBtn.style.display = 'block';
                }
            }

            // Scroll to checkout form
            window.scrollToCheckout = function() {
                if (submitBtn) {
                    submitBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            };

            // Listen to scroll events
            window.addEventListener('scroll', updateFloatingButton);
            window.addEventListener('resize', updateFloatingButton);
            
            // Initial check after page load
            setTimeout(updateFloatingButton, 100);
            setTimeout(updateFloatingButton, 500);
        })();
    </script>

    <script src="algeria-data.js"></script>
    <script src="delivery-prices.js"></script>
    <script src="product.js"></script>
</body>
</html>
